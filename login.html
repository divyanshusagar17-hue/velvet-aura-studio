<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
}

.container{
width:400px;
background:#1e293b;
padding:40px;
border-radius:15px;
}

h2{
color:#22d3ee;
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
background:#22d3ee;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

p{
text-align:center;
margin-top:15px;
color:white;
}

a{
color:#22d3ee;
text-decoration:none;
}

.back-btn{
display:inline-block;
margin-bottom:20px;
padding:8px 15px;
border:1px solid #22d3ee;
border-radius:8px;
}

.back-btn:hover{
background:#22d3ee;
color:black;
}
</style>

</head>
<body>

<div class="container">

<a href="index.html" class="back-btn">← Back</a>

<h2>Login</h2>

<form id="loginForm">

<input type="email" id="loginEmail" placeholder="Email" required>

<input type="password" id="loginPassword" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>

</div>

<script type="module" src="firebase-auth.js"></script>

</body>
</html>
